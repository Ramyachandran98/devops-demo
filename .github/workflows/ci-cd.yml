name: Build and Test Microservices

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-user-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies - User Service
        run: cd services/user-service && npm install
      
      - name: Test User Service health check
        run: |
          cd services/user-service && npm start &
          sleep 2
          curl -f http://localhost:3001/health || exit 1
          pkill -f "node app.js"

  test-product-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies - Product Service
        run: cd services/product-service && npm install
      
      - name: Test Product Service health check
        run: |
          cd services/product-service && npm start &
          sleep 2
          curl -f http://localhost:3002/health || exit 1
          pkill -f "node app.js"

  test-order-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies - Order Service
        run: cd services/order-service && npm install
      
      - name: Test Order Service health check
        run: |
          cd services/order-service && npm start &
          sleep 2
          curl -f http://localhost:3003/health || exit 1
          pkill -f "node app.js"

  build-docker-images:
    runs-on: ubuntu-latest
    needs: [test-user-service, test-product-service, test-order-service]
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build User Service image
        uses: docker/build-push-action@v4
        with:
          context: ./services/user-service
          push: false
          tags: user-service:latest
      
      - name: Build Product Service image
        uses: docker/build-push-action@v4
        with:
          context: ./services/product-service
          push: false
          tags: product-service:latest
      
      - name: Build Order Service image
        uses: docker/build-push-action@v4
        with:
          context: ./services/order-service
          push: false
          tags: order-service:latest
