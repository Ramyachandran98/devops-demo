name: Deploy to Kubernetes

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.27.0'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Verify Kubernetes Cluster Connection
        run: |
          kubectl get nodes

      - name: Build and Push User Service Image
        uses: docker/build-push-action@v4
        with:
          context: ./services/user-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/user-service:latest
            ${{ secrets.DOCKER_USERNAME }}/user-service:${{ github.sha }}

      - name: Build and Push Product Service Image
        uses: docker/build-push-action@v4
        with:
          context: ./services/product-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/product-service:latest
            ${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.sha }}

      - name: Build and Push Order Service Image
        uses: docker/build-push-action@v4
        with:
          context: ./services/order-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/order-service:latest
            ${{ secrets.DOCKER_USERNAME }}/order-service:${{ github.sha }}

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s/user-service-deployment.yaml
          kubectl apply -f k8s/product-service-deployment.yaml
          kubectl apply -f k8s/order-service-deployment.yaml

      - name: Restart Deployments
        run: |
          kubectl rollout restart deployment user-service
          kubectl rollout restart deployment product-service
          kubectl rollout restart deployment order-service

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/user-service --timeout=5m
          kubectl rollout status deployment/product-service --timeout=5m
          kubectl rollout status deployment/order-service --timeout=5m

      - name: Verify Deployment
        run: |
          echo "=== Deployments ==="
          kubectl get deployments
          echo ""
          echo "=== Pods ==="
          kubectl get pods
          echo ""
          echo "=== Services ==="
          kubectl get svc
          echo ""
          echo "=== Describe Pods ==="
          kubectl describe pods
